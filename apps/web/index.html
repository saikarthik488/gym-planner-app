<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#08111f" />
    <meta
      name="description"
      content="Gym planner with weekly splits, exercise tracking, and local progress saved on your device."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gym Planner" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <title>Gym Planner</title>
    <script>
      (function () {
        var APP_VERSION = "2026-03-18-4";
        var VERSION_KEY = "gym-planner-app-version";
        var storedVersion = window.localStorage.getItem(VERSION_KEY);
        var url = new URL(window.location.href);
        var refreshToken = url.searchParams.get("v");

        if (storedVersion !== APP_VERSION) {
          window.localStorage.setItem(VERSION_KEY, APP_VERSION);

          if (refreshToken !== APP_VERSION) {
            url.searchParams.set("v", APP_VERSION);
            window.location.replace(url.toString());
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
